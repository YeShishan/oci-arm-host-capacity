name: OCI Instance Creator

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist

      - name: Write private key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY_FILENAME }}" > /tmp/oci_key.pem
          chmod 600 /tmp/oci_key.pem

      - name: Run
        id: run_script
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_key.pem
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          OUTPUT=$(php index.php 2>&1)
          echo "$OUTPUT"
          echo "script_output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Telegram - نجح
        if: success()
        run: |
          curl -s -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_API_KEY }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
          -d parse_mode="HTML" \
          -d text="$(cat <<EOF
          ✅ <b>تم إنشاء Oracle VM بنجاح!</b>

          🔢 رقم المحاولة: ${{ github.run_number }}
          ⏰ الوقت: $(date '+%Y-%m-%d %H:%M UTC')
          ⏱️ الفترة بين كل محاولة: 30 دقيقة
          📋 النتيجة: ${{ steps.run_script.outputs.script_output }}

          ⛔ أوقف البوت الآن من GitHub Actions!
          EOF
          )"

      - name: Telegram - فشل
        if: failure()
        run: |
          curl -s -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_API_KEY }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
          -d parse_mode="HTML" \
          -d text="$(cat <<EOF
          ❌ <b>فشلت المحاولة</b>

          🔢 رقم المحاولة: ${{ github.run_number }}
          ⏰ الوقت: $(date '+%Y-%m-%d %H:%M UTC')
          ⏱️ المحاولة التالية بعد: 30 دقيقة
          📋 السبب: ${{ steps.run_script.outputs.script_output }}
          EOF
          )"
