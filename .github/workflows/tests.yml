name: OCI Instance Creator 1v

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist

      - name: Write private key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY_FILENAME }}" > /tmp/oci_key.pem
          chmod 600 /tmp/oci_key.pem

      - name: Run script
        id: run
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_key.pem
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          OUTPUT=$(php index.php 2>&1)
          echo "$OUTPUT"
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          MECCA_TIME=$(TZ='Asia/Riyadh' date '+%H:%M - %d/%m/%Y')
          echo "time=$MECCA_TIME" >> $GITHUB_OUTPUT
          if echo "$OUTPUT" | grep -qi "ocid1.instance"; then
            echo "status=success" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -qi "out of host capacity\|InternalError"; then
            echo "status=no_capacity" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -qi "maximum\|already\|Max"; then
            echo "status=exists" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: Notify - Success
        if: steps.run.outputs.status == 'success'
        run: |
          OUTPUT="${{ steps.run.outputs.output }}"
          INSTANCE_ID=$(echo "$OUTPUT" | grep -o 'ocid1\.instance\.[^"]*' | head -1)
          MSG="SUCCESS - Oracle VM Created! | Time (Mecca): ${{ steps.run.outputs.time }} | Attempt: ${{ github.run_number }} | Instance ID: ${INSTANCE_ID} | Full output: ${OUTPUT} | STOP THE BOT NOW from GitHub Actions!"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_API_KEY }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            --data-urlencode text="${MSG}"

      - name: Notify - VM Already Exists
        if: steps.run.outputs.status == 'exists'
        run: |
          MSG="VM ALREADY EXISTS | Time (Mecca): ${{ steps.run.outputs.time }} | Max instances reached | STOP THE BOT - VM is ready in Oracle Cloud!"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_API_KEY }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            --data-urlencode text="${MSG}"

      - name: Notify - Unexpected Error
        if: steps.run.outputs.status == 'error'
        run: |
          MSG="UNEXPECTED ERROR | Time (Mecca): ${{ steps.run.outputs.time }} | Attempt: ${{ github.run_number }} | Details: ${{ steps.run.outputs.output }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_API_KEY }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            --data-urlencode text="${MSG}"

      - name: Notify - Hourly Report
        if: steps.run.outputs.status == 'no_capacity'
        run: |
          RUN_NUM=${{ github.run_number }}
          if [ $((RUN_NUM % 12)) -eq 0 ]; then
            MSG="HOURLY REPORT | Time (Mecca): ${{ steps.run.outputs.time }} | Total attempts: ${{ github.run_number }} | Server response: Out of capacity | Retrying every 5 minutes automatically"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_API_KEY }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
              --data-urlencode text="${MSG}"
          fi
